# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - wapp-en2dsymhxxnle

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://aelieveuptime.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_9ffa9cbdab4b4a899766ddcd9dc6438e }}
        password: ${{ secrets.AzureAppService_ContainerPassword_af674a1709be4817992f12c0d2333dd4 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: aelieveuptime.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_9ffa9cbdab4b4a899766ddcd9dc6438e }}/aeleive-uptime-kuma:${{ github.sha }}
        file: ./docker/Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'wapp-en2dsymhxxnle'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_1097c886564b4329a809ad12e3703e3f }}
        images: 'aelieveuptime.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_9ffa9cbdab4b4a899766ddcd9dc6438e }}/aeleive-uptime-kuma:${{ github.sha }}'
